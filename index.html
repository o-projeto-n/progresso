<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
  <audio id="musicaHexatombe" loop autoplay>
    <source src="vermelho.mp3" type="audio/mpeg">
</audio>
    <title>Projeto N</title>
</head>
<body>
    <div class="main-container">
        <div class="container">
            <h1>TEMPORADA 1</h1>
            <p>FALTAM ALGUMAS SEMANAS PARA O TRIBUTO</p>
            <div class="moon-container">
            🌙 </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <div class="status-text">
              45% concluído</div>
          <div class="left-text"><b>Faltam 55% para o Hexatombe
            </b></div>
        </div>
    </div>
  <div class="disclaimer">ESSE SITE NÃO TEM NENHUMA AFILIAÇÃO COM ORDEM PARANORMAL OU SUA EQUIPE.</div>
</body>
    <script  src="./script.js"></script>
  </body>
</html>

<style>
  @import url("https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&display=swap");

body {
  font-family: "Crimson Text";
  background-image: linear-gradient(rgba(0, 0, 0, 0.98), rgba(75, 0, 0, 0.8)), url("https://i.imgur.com/1o1MBMp.png");
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  letter-spacing: 2px;
  background-color: rgba(0, 0, 0, 1);
  color: #F21120;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}

.main-container {
  display: flex;
  align-items: center;
  gap: 20px;
}

.moon-container {
  text-shadow: 0 0 10px #d6d60b;
  filter: contrast(10%) hue-rotate(323deg) brightness(100%) saturate(5000%);
  font-size: 80px;
  color: #ff0000;
  transform: rotate(-20deg);
}

.container {
  width: 80%;
  max-width: 600px;
  text-align: center;
  border: 0px solid #cc0000;
  padding: 30px;
  background-color: rgba(0, 0, 0, 0);
}

.progress-container {
  background-color: #330000;
  border: 2px solid #F21120;
  width: 100%;
  height: 30px;
  margin: 30px 0 15px 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 10px #ff0000cc;
}

.progress-bar {
  background-color: #990000;
  height: 100%;
  width: 45%; /* Progresso */
  transition: width 0.7s ease-in-out;
}

h1 {
  margin-top: 0;
  font-weight: 700;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #ff0000;
}

p {
  margin-bottom: 5px;
  opacity: 0.9;
}

.status-text {
  margin-top: 5px;
  font-size: 1em;
  opacity: 1;
  font-style: regular;
}

.left-text {
  font-size: 1.2em;
}
.disclaimer {
  color: #ffffff;
  position: relative;
  display: flex;
  top: 400px;
  padding-bottom: 30px;
}
</style>

<script>    
  const audio = document.getElementById("musicaHexatombe");

    function tentarTocar() {
        audio.play().catch(() => {
            console.log("Autoplay bloqueado. A música iniciará na primeira interação.");
            
            // Tenta tocar no primeiro clique em qualquer lugar da página
            const tocarAoInteragir = () => {
                audio.play();
                document.removeEventListener('click', tocarAoInteragir);
                document.removeEventListener('scroll', tocarAoInteragir);
                document.removeEventListener('touchstart', tocarAoInteragir);
            };

            document.addEventListener('click', tocarAoInteragir);
            document.addEventListener('scroll', tocarAoInteragir);
            document.addEventListener('touchstart', tocarAoInteragir);
        });
    }

    // Executa assim que a página carrega
    window.addEventListener('load', tentarTocar);
</script>
